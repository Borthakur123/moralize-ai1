kind = "web"
previewPath = "/"
title = "AI Discourse Annotation Platform"
version = "1.0.0"
id = "artifacts/moralize-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21494

[services.development]
run = "pnpm --filter @workspace/moralize-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/moralize-ai", "run", "build" ]
publicDir = "artifacts/moralize-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21494"
BASE_PATH = "/"
